server {
    listen 80;
    server_name _;
    root /var/www/megawifi/public;
    index index.php index.html;
    charset utf-8;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location = /sw.js { add_header Cache-Control "no-cache, no-store, must-revalidate" always; expires 0; }
    location = /sw-iptv.js { add_header Cache-Control "no-cache, no-store, must-revalidate" always; expires 0; }
    location = /sw-balance.js { add_header Cache-Control "no-cache, no-store, must-revalidate" always; expires 0; }

    location = /manifest.json { default_type application/manifest+json; add_header Cache-Control "no-cache" always; expires 0; }
    location = /manifest-iptv.json { default_type application/manifest+json; add_header Cache-Control "no-cache" always; expires 0; }
    location = /manifest-balance.json { default_type application/manifest+json; add_header Cache-Control "no-cache" always; expires 0; }

    location ^~ /icons/ { expires 1h; access_log off; }

    location ~* \.(jpg|jpeg|png|gif|ico|webp|css|js|woff|woff2|ttf|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /downloads/ { add_header Content-Disposition "attachment"; }

    location = /iptv/stream-proxy {
        fastcgi_pass megawifi-app:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/megawifi/public/index.php;
        include fastcgi_params;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_buffering off;
        proxy_buffering off;
        gzip off;
        fastcgi_read_timeout 3600;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass megawifi-app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 8 256k;
        fastcgi_busy_buffers_size 512k;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    location ~ /\.(?!well-known).* { deny all; }
}
