<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1b3a5c"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="50%" style="stop-color:#f7c948"/>
      <stop offset="100%" style="stop-color:#ffe066"/>
    </linearGradient>
    <linearGradient id="live" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60"/>
      <stop offset="100%" style="stop-color:#2ecc71"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow3d">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#f5a623" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <rect x="6" y="6" width="188" height="188" rx="38" fill="none" stroke="#f5a623" stroke-width="1.5" opacity="0.2"/>
  <!-- Flame icon smaller -->
  <path d="M90 55 C90 55, 82 78, 86 92 C87 97, 93 102, 100 102 C107 102, 113 97, 114 92 C118 78, 110 55, 110 55 C108 63, 105 68, 100 68 C95 68, 92 63, 90 55Z" fill="url(#flame)" filter="url(#shadow3d)"/>
  <!-- مباشر text -->
  <text x="100" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="url(#flame)" filter="url(#glow)">الجزيرة</text>
  <text x="100" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#2ecc71">مباشر</text>
  <!-- LIVE pulse -->
  <circle cx="28" cy="28" r="10" fill="url(#live)" opacity="0.8"/>
  <circle cx="28" cy="28" r="5" fill="#fff"/>
</svg>
