<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7d794"/>
      <stop offset="100%" style="stop-color:#f5cd79"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#e94560" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <rect x="8" y="8" width="184" height="184" rx="36" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <text x="100" y="82" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="url(#gold)" filter="url(#glow)">beIN</text>
  <text x="100" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#e94560" letter-spacing="4">SPORTS</text>
  <circle cx="100" cy="152" r="24" fill="url(#accent)" filter="url(#shadow)"/>
  <text x="100" y="161" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white">3</text>
  <rect x="140" y="20" width="42" height="22" rx="11" fill="url(#accent)" opacity="0.9"/>
  <text x="161" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white">HD</text>
</svg>
