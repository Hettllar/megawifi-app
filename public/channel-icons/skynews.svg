<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1445"/>
      <stop offset="100%" style="stop-color:#1a237e"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="white" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow3d">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#e74c3c" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <rect x="6" y="6" width="188" height="188" rx="38" fill="none" stroke="url(#sky)" stroke-width="1.5" opacity="0.25"/>
  <!-- Sky stylized -->
  <text x="100" y="78" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="url(#white)" filter="url(#glow)">SKY</text>
  <!-- NEWS text -->
  <text x="100" y="110" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="30" font-weight="900" fill="url(#sky)" filter="url(#shadow3d)">NEWS</text>
  <!-- عربية text -->
  <text x="100" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="url(#white)" opacity="0.8">عربية</text>
  <!-- Red accent line -->
  <rect x="55" y="118" width="90" height="3" rx="1.5" fill="url(#sky)" opacity="0.6"/>
</svg>
