<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a"/>
      <stop offset="100%" style="stop-color:#3d1010"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecf0f1"/>
      <stop offset="100%" style="stop-color:#bdc3c7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow3d">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#e74c3c" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <rect x="6" y="6" width="188" height="188" rx="38" fill="none" stroke="url(#red)" stroke-width="1.5" opacity="0.3"/>
  <!-- Stylized A shape -->
  <path d="M70 130 L100 55 L130 130 M80 110 L120 110" fill="none" stroke="url(#red)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow3d)"/>
  <!-- العربية text -->
  <text x="100" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="url(#silver)" filter="url(#glow)">العربية</text>
  <!-- NEWS badge -->
  <rect x="132" y="18" width="52" height="22" rx="11" fill="url(#red)"/>
  <text x="158" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white">NEWS</text>
</svg>
