<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b0a2e"/>
      <stop offset="100%" style="stop-color:#311b5c"/>
    </linearGradient>
    <linearGradient id="mbc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4"/>
      <stop offset="100%" style="stop-color:#4dd0e1"/>
    </linearGradient>
    <linearGradient id="num" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ab47bc"/>
      <stop offset="100%" style="stop-color:#ce93d8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow3d">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#ab47bc" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <rect x="6" y="6" width="188" height="188" rx="38" fill="none" stroke="url(#num)" stroke-width="1.5" opacity="0.2"/>
  <!-- MBC text -->
  <text x="100" y="85" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="50" font-weight="900" fill="url(#mbc)" filter="url(#glow)">MBC</text>
  <!-- Big 4 -->
  <text x="100" y="150" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="url(#num)" filter="url(#shadow3d)">4</text>
</svg>
