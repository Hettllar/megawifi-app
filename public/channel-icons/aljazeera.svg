<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1b3a5c"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="50%" style="stop-color:#f7c948"/>
      <stop offset="100%" style="stop-color:#ffe066"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow3d">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#f5a623" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <rect x="6" y="6" width="188" height="188" rx="38" fill="none" stroke="#f5a623" stroke-width="1.5" opacity="0.2"/>
  <!-- Stylized AJ flame/torch shape -->
  <path d="M85 60 C85 60, 75 90, 80 110 C82 118, 90 125, 100 125 C110 125, 118 118, 120 110 C125 90, 115 60, 115 60 C112 70, 108 78, 100 78 C92 78, 88 70, 85 60Z" fill="url(#flame)" filter="url(#shadow3d)"/>
  <circle cx="100" cy="95" r="8" fill="#0a1628" opacity="0.3"/>
  <!-- الجزيرة text -->
  <text x="100" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="url(#flame)" filter="url(#glow)">الجزيرة</text>
  <!-- LIVE badge -->
  <rect x="140" y="18" width="44" height="22" rx="11" fill="#e74c3c"/>
  <circle cx="153" cy="29" r="4" fill="#fff" opacity="0.9"/>
  <text x="170" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white">LIVE</text>
</svg>
