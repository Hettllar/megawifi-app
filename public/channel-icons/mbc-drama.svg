<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
    <linearGradient id="mbc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4"/>
      <stop offset="100%" style="stop-color:#26c6da"/>
    </linearGradient>
    <linearGradient id="drama" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e040fb"/>
      <stop offset="100%" style="stop-color:#ea80fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow3d">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#e040fb" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <rect x="6" y="6" width="188" height="188" rx="38" fill="none" stroke="url(#drama)" stroke-width="1.5" opacity="0.25"/>
  <!-- MBC text -->
  <text x="100" y="85" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="url(#mbc)" filter="url(#glow)">MBC</text>
  <!-- DRAMA text -->
  <text x="100" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="url(#drama)" letter-spacing="5" filter="url(#shadow3d)">DRAMA</text>
  <!-- Film strip decoration -->
  <rect x="30" y="145" width="140" height="24" rx="4" fill="none" stroke="url(#drama)" stroke-width="1.5" opacity="0.4"/>
  <rect x="38" y="149" width="12" height="16" rx="2" fill="url(#drama)" opacity="0.3"/>
  <rect x="56" y="149" width="12" height="16" rx="2" fill="url(#drama)" opacity="0.3"/>
  <rect x="74" y="149" width="12" height="16" rx="2" fill="url(#drama)" opacity="0.3"/>
  <rect x="92" y="149" width="12" height="16" rx="2" fill="url(#drama)" opacity="0.3"/>
  <rect x="110" y="149" width="12" height="16" rx="2" fill="url(#drama)" opacity="0.3"/>
  <rect x="128" y="149" width="12" height="16" rx="2" fill="url(#drama)" opacity="0.3"/>
  <rect x="146" y="149" width="12" height="16" rx="2" fill="url(#drama)" opacity="0.3"/>
</svg>
