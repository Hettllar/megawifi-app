<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="redGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#FF0000" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text3D" x="-5%" y="-5%" width="115%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="1" flood-color="#000" flood-opacity="0.8"/>
    </filter>
    <linearGradient id="antennaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#888"/><stop offset="50%" stop-color="#ddd"/><stop offset="100%" stop-color="#777"/>
    </linearGradient>
    <linearGradient id="megaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF4444"/><stop offset="50%" stop-color="#DD0000"/><stop offset="100%" stop-color="#880000"/>
    </linearGradient>
    <linearGradient id="tvGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE44D"/><stop offset="50%" stop-color="#FFC107"/><stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="tvFrameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0392B"/><stop offset="50%" stop-color="#922B21"/><stop offset="100%" stop-color="#641E16"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/><stop offset="60%" stop-color="#F5F5F5"/><stop offset="100%" stop-color="#EEEEEE"/>
    </radialGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4444"/><stop offset="40%" stop-color="#FF0000"/><stop offset="100%" stop-color="#880000"/>
    </radialGradient>
  </defs>

  <!-- Full background for maskable -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Content scaled to safe zone (80%) -->
  <g transform="translate(51,51) scale(0.8)">
  <!-- Scale up TV content -->
  <g transform="translate(256, 242) scale(1.15) translate(-256, -242)">
    <!-- Antennas -->
    <line x1="210" y1="148" x2="148" y2="58" stroke="#000" stroke-width="7" stroke-linecap="round" opacity="0.4"/>
    <line x1="208" y1="145" x2="146" y2="55" stroke="url(#antennaGrad)" stroke-width="5" stroke-linecap="round"/>
    <line x1="302" y1="148" x2="364" y2="58" stroke="#000" stroke-width="7" stroke-linecap="round" opacity="0.4"/>
    <line x1="300" y1="145" x2="362" y2="55" stroke="url(#antennaGrad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Antenna tips -->
    <circle cx="146" cy="55" r="10" fill="url(#dotGlow)" filter="url(#redGlow)"/>
    <circle cx="146" cy="55" r="4.5" fill="#FF6666"/>
    <circle cx="144" cy="53" r="2" fill="white" opacity="0.6"/>
    <circle cx="362" cy="55" r="10" fill="url(#dotGlow)" filter="url(#redGlow)"/>
    <circle cx="362" cy="55" r="4.5" fill="#FF6666"/>
    <circle cx="360" cy="53" r="2" fill="white" opacity="0.6"/>

    <!-- TV Body -->
    <rect x="82" y="142" width="348" height="244" rx="24" ry="24" fill="#3D0F0A"/>
    <rect x="80" y="138" width="348" height="240" rx="24" ry="24" fill="url(#tvFrameGrad)" stroke="#5B1A14" stroke-width="2"/>
    <rect x="84" y="140" width="340" height="45" rx="22" ry="22" fill="white" opacity="0.07"/>
    <rect x="100" y="155" width="310" height="205" rx="14" ry="14" fill="#000"/>

    <!-- MEGA 3D -->
    <text x="255" y="295" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="100" fill="#550000" letter-spacing="-1" font-style="italic">MEGA</text>
    <text x="253" y="293" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="100" fill="#660000" letter-spacing="-1" font-style="italic">MEGA</text>
    <text x="251" y="291" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="100" fill="url(#megaGrad)" letter-spacing="-1" font-style="italic" filter="url(#text3D)">MEGA</text>

    <!-- TV 3D -->
    <text x="328" y="358" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="76" fill="#5A3800" letter-spacing="2">TV</text>
    <text x="326" y="356" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="76" fill="url(#tvGrad)" letter-spacing="2" filter="url(#text3D)">TV</text>

    <!-- Stand -->
    <rect x="218" y="382" width="72" height="9" rx="4.5" ry="4.5" fill="#555"/>
    <line x1="230" y1="391" x2="210" y2="408" stroke="#666" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="273" y1="391" x2="293" y2="408" stroke="#666" stroke-width="4.5" stroke-linecap="round"/>
    <rect x="192" y="408" width="122" height="8" rx="4" ry="4" fill="#555"/>
  </g>
  </g>
</svg>