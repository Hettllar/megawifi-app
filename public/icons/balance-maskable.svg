<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main gradient - vibrant blue to deep indigo (safe zone padding for maskable) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="walletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="40%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="coinShine" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Full background for maskable -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Content centered in safe zone (inner 80% = ~102-410) -->
  <g transform="translate(256,256) scale(0.7) translate(-256,-256)">
    <!-- Ambient glow circles -->
    <circle cx="160" cy="160" r="100" fill="#818cf8" opacity="0.15"/>
    <circle cx="370" cy="370" r="90" fill="#06b6d4" opacity="0.12"/>

    <!-- Wallet body -->
    <rect x="82" y="175" width="300" height="200" rx="26" fill="url(#walletGrad)"/>
    <!-- Wallet flap -->
    <path d="M82 215 Q82 158 126 158 L340 138 Q378 132 378 175 L378 215 Z" fill="white" opacity="0.92"/>
    <!-- Wallet clasp -->
    <rect x="326" y="198" width="48" height="34" rx="10" fill="url(#cardGrad)" opacity="0.9"/>

    <!-- Card inside -->
    <g transform="rotate(-4,200,280)">
      <rect x="118" y="238" width="170" height="100" rx="14" fill="url(#cardGrad)"/>
      <rect x="138" y="260" width="30" height="22" rx="5" fill="#fbbf24" opacity="0.8"/>
      <rect x="138" y="302" width="70" height="5" rx="3" fill="white" opacity="0.3"/>
    </g>

    <!-- Gold coin -->
    <g transform="translate(370, 310)">
      <circle cx="0" cy="4" r="54" fill="#b45309"/>
      <circle cx="0" cy="0" r="54" fill="url(#coinGrad)"/>
      <circle cx="0" cy="0" r="44" fill="none" stroke="#fde68a" stroke-width="2.5" opacity="0.6"/>
      <text x="0" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="900" fill="#fffbeb">$</text>
      <ellipse cx="-14" cy="-16" rx="22" ry="16" fill="url(#coinShine)" transform="rotate(-30,-14,-16)"/>
    </g>

    <!-- Small coin -->
    <circle cx="416" cy="186" r="20" fill="url(#coinGrad)"/>
    <text x="416" y="193" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#fffbeb">$</text>
  </g>
</svg>