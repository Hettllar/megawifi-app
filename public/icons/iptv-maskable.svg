<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="40%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0c1445"/>
    </linearGradient>
    <radialGradient id="aurora1" cx="30%" cy="15%" r="50%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="75%" cy="20%" r="40%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c026d3"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <radialGradient id="playInner" cx="35%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#e879f9;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <!-- Full background for maskable -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#aurora1)"/>
  <rect width="512" height="512" fill="url(#aurora2)"/>

  <!-- Content in safe zone (65% scale) -->
  <g transform="translate(256,246) scale(0.62) translate(-256,-246)">
    <!-- TV Frame -->
    <rect x="78" y="112" width="356" height="244" rx="20" fill="#0f172a" stroke="url(#frameGrad)" stroke-width="2.5"/>
    <!-- Screen -->
    <rect x="86" y="120" width="340" height="228" rx="14" fill="#080d1a"/>

    <!-- Play button -->
    <circle cx="256" cy="234" r="58" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.3"/>
    <circle cx="256" cy="234" r="44" fill="url(#playGrad)"/>
    <circle cx="256" cy="234" r="44" fill="url(#playInner)"/>
    <polygon points="245,214 245,254 273,234" fill="white" opacity="0.95"/>

    <!-- LIVE badge -->
    <rect x="100" y="132" width="52" height="22" rx="6" fill="#dc2626" opacity="0.85"/>
    <circle cx="112" cy="143" r="3" fill="white"/>
    <text x="134" y="148" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">LIVE</text>

    <!-- 4K badge -->
    <rect x="374" y="132" width="40" height="20" rx="5" fill="none" stroke="url(#ringGrad)" stroke-width="1" opacity="0.6"/>
    <text x="394" y="147" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#c084fc" opacity="0.7">4K</text>

    <!-- Signal bars -->
    <g transform="translate(384, 308)" opacity="0.5">
      <rect x="0" y="18" width="5" height="10" rx="1" fill="#22d3ee"/>
      <rect x="8" y="12" width="5" height="16" rx="1" fill="#818cf8"/>
      <rect x="16" y="6" width="5" height="22" rx="1" fill="#a855f7"/>
      <rect x="24" y="0" width="5" height="28" rx="1" fill="#c084fc"/>
    </g>

    <!-- TV Stand -->
    <rect x="222" y="350" width="68" height="5" rx="2.5" fill="url(#ringGrad)" opacity="0.4"/>
    <rect x="196" y="355" width="120" height="4" rx="2" fill="url(#ringGrad)" opacity="0.25"/>
  </g>

  <!-- Branding -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="900" fill="url(#ringGrad)" letter-spacing="3" opacity="0.5">MEGA TV</text>
</svg>