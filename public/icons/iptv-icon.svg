<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Glow effects -->
    <filter id="redGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#FF0000" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong text shadow for 3D depth -->
    <filter id="text3D" x="-5%" y="-5%" width="115%" height="130%">
      <feDropShadow dx="3" dy="4" stdDeviation="1" flood-color="#000" flood-opacity="0.9"/>
      <feDropShadow dx="1.5" dy="2" stdDeviation="0.5" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <!-- TV body shadow -->
    <filter id="tvShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <!-- Inner glow for screen -->
    <filter id="screenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Antenna metallic gradient -->
    <linearGradient id="antennaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="30%" stop-color="#ccc"/>
      <stop offset="50%" stop-color="#fff"/>
      <stop offset="70%" stop-color="#bbb"/>
      <stop offset="100%" stop-color="#777"/>
    </linearGradient>

    <!-- MEGA text gradient - rich red 3D -->
    <linearGradient id="megaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF4444"/>
      <stop offset="25%" stop-color="#EE1111"/>
      <stop offset="50%" stop-color="#DD0000"/>
      <stop offset="75%" stop-color="#BB0000"/>
      <stop offset="100%" stop-color="#880000"/>
    </linearGradient>

    <!-- MEGA text highlight -->
    <linearGradient id="megaHighlight" x1="0%" y1="0%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#FF8888" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF0000" stop-opacity="0"/>
    </linearGradient>

    <!-- TV text gradient - golden 3D -->
    <linearGradient id="tvGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE44D"/>
      <stop offset="20%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFC107"/>
      <stop offset="80%" stop-color="#E5A800"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>

    <!-- TV screen frame gradient (reddish-brown like original) -->
    <linearGradient id="tvFrameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0392B"/>
      <stop offset="30%" stop-color="#A93226"/>
      <stop offset="50%" stop-color="#922B21"/>
      <stop offset="80%" stop-color="#7B241C"/>
      <stop offset="100%" stop-color="#641E16"/>
    </linearGradient>

    <!-- TV body 3D edge -->
    <linearGradient id="tvEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D44637"/>
      <stop offset="100%" stop-color="#5B1A14"/>
    </linearGradient>

    <!-- Background radial - white -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#EEEEEE"/>
    </radialGradient>

    <!-- Screen inner ambient -->
    <radialGradient id="screenAmbient" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0a0a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Red dot radial glow -->
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4444"/>
      <stop offset="40%" stop-color="#FF0000"/>
      <stop offset="100%" stop-color="#880000"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="76" ry="76" fill="url(#bgGrad)"/>

  <!-- Scale up TV content to fill more of the icon -->
  <g transform="translate(256, 242) scale(1.15) translate(-256, -242)">

  <!-- ====== ANTENNAS ====== -->
  <!-- Left antenna shadow -->
  <line x1="210" y1="158" x2="148" y2="68" stroke="#000" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <!-- Left antenna metallic -->
  <line x1="208" y1="155" x2="146" y2="65" stroke="url(#antennaGrad)" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="207" y1="153" x2="147" y2="67" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

  <!-- Right antenna shadow -->
  <line x1="302" y1="158" x2="364" y2="68" stroke="#000" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <!-- Right antenna metallic -->
  <line x1="300" y1="155" x2="362" y2="65" stroke="url(#antennaGrad)" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="301" y1="153" x2="363" y2="67" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

  <!-- Left antenna red glowing tip -->
  <circle cx="146" cy="65" r="14" fill="#FF0000" opacity="0.15" filter="url(#screenGlow)"/>
  <circle cx="146" cy="65" r="11" fill="url(#dotGlow)" filter="url(#redGlow)"/>
  <circle cx="146" cy="65" r="5" fill="#FF6666"/>
  <circle cx="144" cy="62" r="2.5" fill="white" opacity="0.7"/>

  <!-- Right antenna red glowing tip -->
  <circle cx="362" cy="65" r="14" fill="#FF0000" opacity="0.15" filter="url(#screenGlow)"/>
  <circle cx="362" cy="65" r="11" fill="url(#dotGlow)" filter="url(#redGlow)"/>
  <circle cx="362" cy="65" r="5" fill="#FF6666"/>
  <circle cx="360" cy="62" r="2.5" fill="white" opacity="0.7"/>

  <!-- ====== TV BODY ====== -->
  <!-- TV outer shadow -->
  <rect x="88" y="148" width="336" height="235" rx="22" ry="22" fill="#000" opacity="0.5" filter="url(#tvShadow)"/>
  <!-- TV body 3D bottom edge -->
  <rect x="82" y="152" width="348" height="244" rx="24" ry="24" fill="#3D0F0A"/>
  <!-- TV body main -->
  <rect x="80" y="148" width="348" height="240" rx="24" ry="24" fill="url(#tvFrameGrad)" stroke="url(#tvEdge)" stroke-width="2.5"/>
  <!-- TV body top highlight -->
  <rect x="84" y="150" width="340" height="50" rx="22" ry="22" fill="white" opacity="0.08"/>
  <!-- TV left edge light -->
  <line x1="83" y1="170" x2="83" y2="360" stroke="white" stroke-width="1.5" opacity="0.1"/>

  <!-- TV screen -->
  <rect x="100" y="165" width="310" height="205" rx="14" ry="14" fill="#000"/>
  <rect x="100" y="165" width="310" height="205" rx="14" ry="14" fill="url(#screenAmbient)"/>
  <!-- Screen subtle reflection -->
  <ellipse cx="200" cy="210" rx="90" ry="35" fill="white" opacity="0.02"/>

  <!-- ====== MEGA TEXT (3D extrusion) ====== -->
  <text x="255" y="305" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="108" fill="#440000" letter-spacing="-1" font-style="italic">MEGA</text>
  <text x="254" y="304" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="108" fill="#550000" letter-spacing="-1" font-style="italic">MEGA</text>
  <text x="253" y="303" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="108" fill="#660000" letter-spacing="-1" font-style="italic">MEGA</text>
  <text x="252" y="302" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="108" fill="#770000" letter-spacing="-1" font-style="italic">MEGA</text>
  <!-- MEGA main -->
  <text x="251" y="301" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="108" fill="url(#megaGrad)" letter-spacing="-1" font-style="italic" filter="url(#text3D)">MEGA</text>
  <!-- MEGA highlight -->
  <text x="251" y="301" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="108" fill="url(#megaHighlight)" letter-spacing="-1" font-style="italic" opacity="0.4">MEGA</text>

  <!-- ====== TV TEXT (3D extrusion) ====== -->
  <text x="330" y="365" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="82" fill="#4A3000" letter-spacing="2">TV</text>
  <text x="329" y="364" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="82" fill="#5A3800" letter-spacing="2">TV</text>
  <text x="328" y="363" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="82" fill="#6B4400" letter-spacing="2">TV</text>
  <!-- TV main -->
  <text x="327" y="362" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="82" fill="url(#tvGrad)" letter-spacing="2" filter="url(#text3D)">TV</text>
  <!-- TV highlight -->
  <text x="327" y="362" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="82" fill="white" letter-spacing="2" opacity="0.08">TV</text>

  <!-- ====== TV STAND ====== -->
  <rect x="220" y="392" width="72" height="10" rx="5" ry="5" fill="#000" opacity="0.5"/>
  <rect x="218" y="390" width="72" height="10" rx="5" ry="5" fill="#555"/>
  <rect x="218" y="390" width="72" height="5" rx="3" ry="3" fill="#777" opacity="0.5"/>

  <!-- Stand legs -->
  <line x1="232" y1="400" x2="210" y2="418" stroke="#000" stroke-width="7" stroke-linecap="round" opacity="0.3"/>
  <line x1="275" y1="400" x2="297" y2="418" stroke="#000" stroke-width="7" stroke-linecap="round" opacity="0.3"/>
  <line x1="230" y1="398" x2="208" y2="416" stroke="#666" stroke-width="5" stroke-linecap="round"/>
  <line x1="273" y1="398" x2="295" y2="416" stroke="#666" stroke-width="5" stroke-linecap="round"/>

  <!-- Stand base -->
  <rect x="192" y="420" width="126" height="9" rx="4.5" ry="4.5" fill="#000" opacity="0.4"/>
  <rect x="190" y="418" width="126" height="9" rx="4.5" ry="4.5" fill="#555"/>
  <rect x="190" y="418" width="126" height="4.5" rx="3" ry="3" fill="#777" opacity="0.4"/>

  <!-- Ambient light effects -->
  <ellipse cx="146" cy="100" rx="40" ry="25" fill="#FF0000" opacity="0.04"/>
  <ellipse cx="362" cy="100" rx="40" ry="25" fill="#FF0000" opacity="0.04"/>
  <ellipse cx="254" cy="395" rx="60" ry="8" fill="#FF3300" opacity="0.03"/>

  </g>
</svg>