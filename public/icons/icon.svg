<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main gradient - deep teal to emerald -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="50%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <!-- Glass shine -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <!-- Router body gradient -->
    <linearGradient id="routerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#d1d5db"/>
    </linearGradient>
    <!-- Router front face -->
    <linearGradient id="routerFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e5e7eb"/>
      <stop offset="100%" style="stop-color:#9ca3af"/>
    </linearGradient>
    <!-- Antenna gradient -->
    <linearGradient id="antennaGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#d1d5db"/>
      <stop offset="100%" style="stop-color:#f3f4f6"/>
    </linearGradient>
    <!-- Signal wave gradient -->
    <linearGradient id="waveGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
    <!-- LED green glow -->
    <radialGradient id="ledGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="60%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </radialGradient>
    <!-- LED blue -->
    <radialGradient id="ledBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="60%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </radialGradient>
    <!-- 3D shadow -->
    <filter id="shadow3d" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#064e3b" flood-opacity="0.45"/>
    </filter>
    <filter id="shadowSmall" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#064e3b" flood-opacity="0.35"/>
    </filter>
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="waveGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Speed gauge gradient -->
    <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="50%" style="stop-color:#eab308"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Ambient glow circles -->
  <circle cx="150" cy="130" r="110" fill="#6ee7b7" opacity="0.12"/>
  <circle cx="380" cy="400" r="90" fill="#22d3ee" opacity="0.1"/>

  <!-- Glass shine overlay -->
  <ellipse cx="200" cy="150" rx="220" ry="160" fill="url(#shine)" opacity="0.45"/>

  <!-- Router body (3D isometric-ish) -->
  <g filter="url(#shadow3d)">
    <!-- Router top face -->
    <path d="M100 300 L256 260 L412 300 L256 340 Z" fill="url(#routerGrad)"/>
    <!-- Router front face -->
    <path d="M100 300 L100 340 L256 380 L256 340 Z" fill="url(#routerFront)" opacity="0.9"/>
    <!-- Router right face -->
    <path d="M256 340 L256 380 L412 340 L412 300 Z" fill="#e5e7eb" opacity="0.7"/>
  </g>

  <!-- Router top highlight -->
  <path d="M120 302 L256 266 L392 302 L256 336 Z" fill="white" opacity="0.15"/>

  <!-- LED lights on router top -->
  <g filter="url(#glow)">
    <circle cx="190" cy="292" r="6" fill="url(#ledGreen)"/>
    <circle cx="215" cy="288" r="6" fill="url(#ledGreen)"/>
    <circle cx="240" cy="284" r="6" fill="url(#ledBlue)"/>
    <circle cx="265" cy="284" r="6" fill="url(#ledBlue)"/>
    <circle cx="290" cy="288" r="5" fill="url(#ledGreen)" opacity="0.5"/>
  </g>

  <!-- Ventilation lines on top -->
  <g opacity="0.1" stroke="#064e3b" stroke-width="1.5">
    <line x1="160" y1="310" x2="230" y2="290"/>
    <line x1="165" y1="316" x2="235" y2="296"/>
    <line x1="170" y1="322" x2="240" y2="302"/>
  </g>

  <!-- Left antenna -->
  <g filter="url(#shadowSmall)">
    <rect x="168" y="150" width="10" height="120" rx="5" fill="url(#antennaGrad)" transform="rotate(-15, 173, 270)"/>
    <circle cx="165" cy="148" r="8" fill="#f3f4f6" transform="rotate(-15, 173, 270)"/>
  </g>

  <!-- Right antenna -->
  <g filter="url(#shadowSmall)">
    <rect x="334" y="150" width="10" height="120" rx="5" fill="url(#antennaGrad)" transform="rotate(15, 339, 270)"/>
    <circle cx="341" cy="148" r="8" fill="#f3f4f6" transform="rotate(15, 339, 270)"/>
  </g>

  <!-- WiFi signal waves (left antenna) -->
  <g filter="url(#waveGlow)" transform="translate(155, 128)" opacity="0.9">
    <path d="M-46 16 Q-23 -16 0 16" fill="none" stroke="#6ee7b7" stroke-width="4" stroke-linecap="round"/>
    <path d="M-34 10 Q-17 -10 0 10" fill="none" stroke="#6ee7b7" stroke-width="4" stroke-linecap="round"/>
    <path d="M-22 4 Q-11 -6 0 4" fill="none" stroke="#34d399" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- WiFi signal waves (right antenna) -->
  <g filter="url(#waveGlow)" transform="translate(352, 128)" opacity="0.9">
    <path d="M0 16 Q23 -16 46 16" fill="none" stroke="#6ee7b7" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 10 Q17 -10 34 10" fill="none" stroke="#6ee7b7" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 4 Q11 -6 22 4" fill="none" stroke="#34d399" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Speed gauge (bottom-right) -->
  <g transform="translate(380, 420)" filter="url(#shadowSmall)">
    <circle cx="0" cy="0" r="44" fill="white" opacity="0.15"/>
    <path d="M-34 10 A38 38 0 0 1 34 10" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
    <path d="M-34 10 A38 38 0 0 1 24 -26" fill="none" stroke="url(#gaugeGrad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Needle -->
    <line x1="0" y1="4" x2="18" y2="-22" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="4" r="5" fill="white" opacity="0.8"/>
    <!-- Labels -->
    <text x="0" y="22" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="white" opacity="0.7">Mbps</text>
  </g>

  <!-- Network nodes decoration (bottom-left) -->
  <g transform="translate(120, 420)" opacity="0.5">
    <circle cx="0" cy="0" r="8" fill="white"/>
    <circle cx="40" cy="-15" r="6" fill="white" opacity="0.7"/>
    <circle cx="50" cy="15" r="5" fill="white" opacity="0.6"/>
    <line x1="7" y1="-3" x2="34" y2="-13" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="7" y1="3" x2="45" y2="13" stroke="white" stroke-width="2" opacity="0.4"/>
    <line x1="44" y1="-10" x2="48" y2="10" stroke="white" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Sparkle effects -->
  <g fill="white">
    <polygon points="420,100 424,90 428,100 438,104 428,108 424,118 420,108 410,104" opacity="0.7"/>
    <polygon points="100,190 103,184 106,190 112,193 106,196 103,202 100,196 94,193" opacity="0.45"/>
    <polygon points="440,260 442,256 444,260 448,262 444,264 442,268 440,264 436,262" opacity="0.35"/>
  </g>

  <!-- "MegaWiFi" branding -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="white" opacity="0.55" letter-spacing="2">MegaWiFi</text>
</svg>